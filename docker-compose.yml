services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pumpdragon
      POSTGRES_PASSWORD: pumpdragon
      POSTGRES_DB: pumpdragon
    volumes:
      - pumpdragon-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pumpdragon -d pumpdragon"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TIMEZONE:-America/Chicago}
    env_file:
      - .env

volumes:
  pumpdragon-db:
